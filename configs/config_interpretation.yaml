# Interpretation Configuration
# For running XAI visualization with LightweightAttentionModel

name: "DIA-Interpretation"

arch:
  backbone: "cnn"
  num_classes: 4
  dropout_rate: 0.3
  vis_dim: 256
  climate_dim: 128
  resume: ""
  # IMPORTANT: Set this to your trained checkpoint
  initial_weights: "./experiments/xBDClimate/LightweightAttentionModel/YYYY-MM-DD.../checkpoints/best.ckpt"
  class_weights: [1.0, 1.0, 1.0, 1.0]

data:
  cache_dir: "./cache_xBD"
  batch_size: 128              # Larger batch for interpretation
  num_workers: 4               # Fewer workers for interpretation
  augment: false               # No augmentation in interpretation
  seed: 42

optimizer:
  type: "AdamW"
  lr: 0.0001
  weight_decay: 0.00001
  scheduler: false

trainer:
  device: 'cuda'
  num_gpus: 1
  precision: '32-true'         # Full precision for interpretation
  epochs: 1
  steps: -1
  log_every_n_steps: 1
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 1
  monitor: "val_f1_macro"
  mode: "max"
  save_dir: "./experiments/"   # Interpretation plots saved here
  early_stop: 1
  monitor_early_stop: "val_f1_macro"
  mode_early_stop: "max"
  gradient_clip_val: 0.0

results:
  interpretation: true         # Enable interpretation mode
  step_interpretation: 1       # Process every Nth sample (1 = all)
